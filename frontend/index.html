<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Receptionist</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="header-info">
        <h1 id="receptionist-name">AI Receptionist</h1>
        <span class="status-dot"></span>
        <span class="status-text">Online</span>
      </div>
    </header>

    <div class="chat-window" id="chat-window">
      <div class="message assistant">
        <div class="bubble">Hello! I'm your AI receptionist. How can I help you today?</div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="user-input"
        placeholder="Type your message..."
        rows="1"
        autofocus
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <button id="call-btn" onclick="toggleCall()" title="Start voice call">
        <svg id="call-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1 19.79 19.79 0 0 1 1.61 4.5 2 2 0 0 1 3.6 2.31h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.98-.98a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </button>
    </div>

    <!-- Voice call status overlay -->
    <div id="call-overlay" style="display:none;">
      <div id="call-status">
        <span id="call-status-text">Connecting...</span>
        <button onclick="toggleCall()">End Call</button>
      </div>
    </div>
  </div>

  <!-- Daily.co Prebuilt for WebRTC voice call -->
  <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
